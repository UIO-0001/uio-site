<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Agence UIO</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--card:#111827;--border:#1e2d40;
  --purple:#7c5cfc;--purple2:#9b7ffe;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --text:#e2e8f0;--muted:#64748b;--white:#fff;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif}
body{padding:2rem 1rem}

/* ── LOGIN ADMIN ── */
#admin-login{max-width:380px;margin:4rem auto}
.uio-logo{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:3px;text-transform:uppercase;color:var(--purple);margin-bottom:2rem;text-align:center}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2rem}
.login-title{font-size:1.3rem;font-weight:700;color:var(--white);margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;font-family:'DM Mono',monospace}
.field input,.field textarea,.field select{width:100%;background:#0d1525;border:1px solid var(--border);border-radius:8px;padding:.7rem .9rem;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--purple)}
.field textarea{resize:vertical;min-height:80px}
.btn{border:none;border-radius:8px;padding:.75rem 1.4rem;font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:var(--purple2)}
.btn-success{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.btn-success:hover{background:rgba(34,197,94,.25)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-sm{padding:.4rem .8rem;font-size:.78rem}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:.6rem .9rem;font-size:.8rem;color:#f87171;margin-top:.8rem;display:none}
.success-msg{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;padding:.6rem .9rem;font-size:.8rem;color:var(--green);margin-top:.8rem;display:none}

/* ── DASHBOARD ADMIN ── */
#admin-dashboard{display:none;max-width:900px;margin:0 auto}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.admin-title{font-size:1.3rem;font-weight:700;color:var(--white)}
.admin-sub{font-size:.75rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px}

.section-title{font-size:.7rem;font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;margin-top:2rem}

/* Tabs */
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.tab{background:transparent;border:1px solid var(--border);border-radius:8px;padding:.5rem 1.1rem;font-size:.82rem;color:var(--muted);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s}
.tab.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* Client cards */
.client-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.client-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem}
.client-name{font-size:1.05rem;font-weight:700;color:var(--white)}
.client-id{font-size:.7rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px}

/* Progress editor */
.progress-editor{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.progress-editor input[type=range]{flex:1;accent-color:var(--purple)}
.progress-val{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--purple2);min-width:40px}
.progress-bar-bg{background:#0d1525;border-radius:999px;height:6px;overflow:hidden;border:1px solid var(--border);margin-bottom:1rem}
.progress-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--purple2));transition:width .3s}

/* Checklist editor */
.checklist-editor{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem}
.check-row{display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;background:#0d1525;border-radius:6px;border:1px solid var(--border);cursor:default;transition:background .15s,border-color .15s}
.check-row.dragging{opacity:.4;border-style:dashed}
.check-row.drag-over{background:#131f35;border-color:var(--purple)}
.drag-handle{color:var(--muted);cursor:grab;font-size:.9rem;flex-shrink:0;user-select:none;line-height:1;padding:0 2px;transition:color .2s}
.drag-handle:hover{color:var(--purple2)}
.drag-handle:active{cursor:grabbing}
.check-row input[type=checkbox]{accent-color:var(--green);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.check-row input[type=text]{background:transparent;border:none;outline:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.83rem;flex:1;padding:0}
.check-row input[type=text]:focus{color:var(--white)}
.btn-delete-check{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0 2px;line-height:1;transition:color .2s;flex-shrink:0}
.btn-delete-check:hover{color:var(--red)}
.add-check-row{display:flex;gap:.5rem;margin-bottom:1rem}
.add-check-row input{flex:1;background:#0d1525;border:1px solid var(--border);border-radius:6px;padding:.45rem .8rem;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.83rem;outline:none;transition:border-color .2s}
.add-check-row input:focus{border-color:var(--purple)}
.btn-add-check{background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.3);color:var(--purple2);border-radius:6px;padding:.45rem .9rem;font-size:.8rem;font-family:'Space Grotesk',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-add-check:hover{background:rgba(124,92,252,.25)}

/* Add client form */
.add-client-card{background:var(--card);border:1px dashed var(--border);border-radius:12px;padding:1.5rem}
.add-client-title{font-size:1rem;font-weight:700;color:var(--white);margin-bottom:1.2rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--green);color:#000;border-radius:8px;padding:.75rem 1.2rem;font-size:.85rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ── LOGIN ADMIN ── -->
<div id="admin-login">
  <div class="uio-logo">Agence UIO — Admin</div>
  <div class="login-card">
    <div class="login-title">🔐 Accès administrateur</div>
    <div class="field">
      <label>Mot de passe admin</label>
      <input type="password" id="admin-pass" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="adminLogin()">Accéder →</button>
    <div class="error-msg" id="admin-error">Mot de passe invalide.</div>
  </div>
</div>

<!-- ── DASHBOARD ADMIN ── -->
<div id="admin-dashboard">
  <div class="admin-header">
    <div>
      <div class="admin-title">Dashboard Admin</div>
      <div class="admin-sub">AGENCE UIO</div>
    </div>
    <button class="btn btn-danger btn-sm" onclick="adminLogout()">Déconnexion</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('clients')">Clients</button>
    <button class="tab" onclick="showTab('add')">+ Nouveau client</button>
  </div>

  <!-- CLIENTS TAB -->
  <div id="tab-clients">
    <div id="clients-list"></div>
  </div>

  <!-- ADD CLIENT TAB -->
  <div id="tab-add" style="display:none">
    <div class="add-client-card">
      <div class="add-client-title">Ajouter un client</div>
      <div class="grid-2">
        <div class="field"><label>ID client (ex: mobilo)</label><input type="text" id="new-id" placeholder="mobilo"></div>
        <div class="field"><label>Nom du projet</label><input type="text" id="new-project" placeholder="Site Mobilo Moving"></div>
        <div class="field"><label>Username (login client)</label><input type="text" id="new-username" placeholder="mobilo"></div>
        <div class="field"><label>Mot de passe client</label><input type="text" id="new-password" placeholder="motdepasse123"></div>
        <div class="field" style="grid-column:1/-1"><label>URL de la démo</label><input type="text" id="new-demo" placeholder="https://uio-0001.github.io/mobilo"></div>
      </div>
      <button class="btn btn-primary" onclick="addClient()">Créer le client →</button>
      <div class="error-msg" id="add-error"></div>
      <div class="success-msg" id="add-success"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BACKEND = 'https://uio-backend.onrender.com';
let ADMIN_PASS = '';
let clientsData = [];

async function adminLogin() {
  const pass = document.getElementById('admin-pass').value.trim();
  const errEl = document.getElementById('admin-error');
  errEl.style.display = 'none';

  try {
    const res  = await fetch(BACKEND + '/portal/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pass})
    });
    const data = await res.json();
    if (!data.success) {
      errEl.style.display = 'block';
      return;
    }
    ADMIN_PASS = pass;
    document.getElementById('admin-login').style.display    = 'none';
    document.getElementById('admin-dashboard').style.display = 'block';
    loadClients();
  } catch(e) {
    errEl.textContent = 'Erreur de connexion.';
    errEl.style.display = 'block';
  }
}

function adminLogout() {
  ADMIN_PASS = '';
  document.getElementById('admin-login').style.display    = 'block';
  document.getElementById('admin-dashboard').style.display = 'none';
  document.getElementById('admin-pass').value = '';
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['clients','add'][i] === tab));
  document.getElementById('tab-clients').style.display = tab === 'clients' ? 'block' : 'none';
  document.getElementById('tab-add').style.display     = tab === 'add'     ? 'block' : 'none';
}

async function loadClients() {
  const res  = await fetch(BACKEND + '/portal/admin/clients', {
    headers: {'X-Admin-Password': ADMIN_PASS}
  });
  const data = await res.json();
  clientsData = data.clients || [];
  renderClients();
}

function renderClients() {
  const container = document.getElementById('clients-list');
  container.innerHTML = '';

  if (clientsData.length === 0) {
    container.innerHTML = '<p style="color:var(--muted);font-size:.85rem">Aucun client pour l\'instant.</p>';
    return;
  }

  clientsData.forEach((client, idx) => {
    const pct = parseInt(client.progress) || 0;
    const card = document.createElement('div');
    card.className = 'client-card';
    card.innerHTML = `
      <div class="client-card-header">
        <div>
          <div class="client-name">${client.project_name}</div>
          <div class="client-id">@${client.username} · ID: ${client.client_id}</div>
        </div>
        <span style="font-family:'DM Mono',monospace;font-size:.85rem;color:var(--purple2);font-weight:700">${pct}%</span>
      </div>

      <div style="font-size:.7rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.4rem">Progression</div>
      <div class="progress-editor">
        <input type="range" min="0" max="100" value="${pct}" id="range-${idx}" oninput="updateRange(${idx})">
        <span class="progress-val" id="pct-${idx}">${pct}%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="bar-${idx}" style="width:${pct}%"></div></div>

      <div style="font-size:.7rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.6rem">URL Démo</div>
      <div class="field" style="margin-bottom:1rem"><input type="text" id="demo-${idx}" value="${client.demo_url || ''}"></div>

      <div style="font-size:.7rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.6rem">Checklist</div>
      <div class="checklist-editor" id="checklist-${idx}"></div>
      <div class="add-check-row">
        <input type="text" id="new-check-${idx}" placeholder="Nouvel élément..." onkeydown="if(event.key==='Enter')addCheckItem(${idx})">
        <button class="btn-add-check" onclick="addCheckItem(${idx})">+ Ajouter</button>
      </div>

      <div style="font-size:.7rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.4rem">Note pour le client</div>
      <div class="field" style="margin-bottom:1rem"><textarea id="notes-${idx}">${client.notes || ''}</textarea></div>

      <button class="btn btn-success btn-sm" onclick="saveClient(${idx})">💾 Sauvegarder</button>
    `;
    container.appendChild(card);

    // Render checklist
    renderChecklist(idx, client.checklist || []);
  });
}

function updateRange(idx) {
  const val = document.getElementById(`range-${idx}`).value;
  document.getElementById(`pct-${idx}`).textContent = val + '%';
  document.getElementById(`bar-${idx}`).style.width = val + '%';
}

async function saveClient(idx) {
  const client    = clientsData[idx];
  const progress  = parseInt(document.getElementById(`range-${idx}`).value);
  const demo_url  = document.getElementById(`demo-${idx}`).value.trim();
  const notes     = document.getElementById(`notes-${idx}`).value.trim();

  // Récupérer checklist depuis le DOM
  const checklist = getChecklist(idx);

  try {
    const res  = await fetch(BACKEND + '/portal/admin/update', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Password': ADMIN_PASS
      },
      body: JSON.stringify({
        client_id: client.client_id,
        progress, checklist, notes, demo_url
      })
    });
    const data = await res.json();
    if (data.success) showToast('✓ Sauvegardé !');
    else showToast('❌ Erreur : ' + data.error);
  } catch(e) {
    showToast('❌ Erreur de connexion');
  }
}

async function addClient() {
  const errEl  = document.getElementById('add-error');
  const succEl = document.getElementById('add-success');
  errEl.style.display  = 'none';
  succEl.style.display = 'none';

  const body = {
    client_id:    document.getElementById('new-id').value.trim(),
    username:     document.getElementById('new-username').value.trim(),
    password:     document.getElementById('new-password').value.trim(),
    project_name: document.getElementById('new-project').value.trim(),
    demo_url:     document.getElementById('new-demo').value.trim()
  };

  if (!body.client_id || !body.username || !body.password || !body.project_name) {
    errEl.textContent = 'Tous les champs obligatoires doivent être remplis.';
    errEl.style.display = 'block';
    return;
  }

  try {
    const res  = await fetch(BACKEND + '/portal/admin/add_client', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Password': ADMIN_PASS
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      succEl.textContent = `✓ Client "${body.project_name}" créé avec succès !`;
      succEl.style.display = 'block';
      ['new-id','new-username','new-password','new-project','new-demo'].forEach(id => {
        document.getElementById(id).value = '';
      });
      loadClients();
      showToast('✓ Client ajouté !');
    } else {
      errEl.textContent = data.error || 'Erreur inconnue.';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Erreur de connexion.';
    errEl.style.display = 'block';
  }
}

function renderChecklist(idx, items) {
  const container = document.getElementById(`checklist-${idx}`);
  container.innerHTML = '';

  items.forEach((item, ci) => {
    const row = document.createElement('div');
    row.className = 'check-row';
    row.draggable = true;
    row.dataset.idx = idx;
    row.dataset.ci  = ci;

    row.innerHTML = `
      <span class="drag-handle" title="Déplacer">⠿</span>
      <input type="checkbox" id="check-${idx}-${ci}" ${item.done ? 'checked' : ''}>
      <input type="text" id="label-${idx}-${ci}" value="${item.label.replace(/"/g, '&quot;')}">
      <button class="btn-delete-check" onclick="deleteCheckItem(${idx}, ${ci})" title="Supprimer">✕</button>
    `;

    // ── Drag events
    row.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', ci);
      row.classList.add('dragging');
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      container.querySelectorAll('.check-row').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      container.querySelectorAll('.check-row').forEach(r => r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      const fromCi = parseInt(e.dataTransfer.getData('text/plain'));
      const toCi   = ci;
      if (fromCi === toCi) return;
      const current = getChecklist(idx);
      const moved   = current.splice(fromCi, 1)[0];
      current.splice(toCi, 0, moved);
      clientsData[idx].checklist = current;
      renderChecklist(idx, current);
    });

    container.appendChild(row);
  });
}

function getChecklist(idx) {
  const container = document.getElementById(`checklist-${idx}`);
  const rows = container.querySelectorAll('.check-row');
  const items = [];
  rows.forEach((row, ci) => {
    const cb = row.querySelector(`input[type=checkbox]`);
    const lb = row.querySelector(`input[type=text]`);
    if (lb && lb.value.trim()) {
      items.push({ label: lb.value.trim(), done: cb ? cb.checked : false });
    }
  });
  return items;
}

function addCheckItem(idx) {
  const input = document.getElementById(`new-check-${idx}`);
  const label = input.value.trim();
  if (!label) return;
  const current = getChecklist(idx);
  current.push({ label, done: false });
  // Mettre à jour clientsData localement
  clientsData[idx].checklist = current;
  renderChecklist(idx, current);
  input.value = '';
  input.focus();
}

function deleteCheckItem(idx, ci) {
  const current = getChecklist(idx);
  current.splice(ci, 1);
  clientsData[idx].checklist = current;
  renderChecklist(idx, current);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('admin-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});
</script>
</body>
</html>
